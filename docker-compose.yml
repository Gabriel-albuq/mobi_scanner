version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: mobi_scanner
    POSTGRES_USER: ${POSTGRES_USER:-mobi}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobi123}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./scraper:/opt/airflow/scraper
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: mobi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mobi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobi123}
      POSTGRES_DB: mobi_scanner
      POSTGRES_MULTIPLE_DATABASES: "mobi_scanner,airflow"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./postgres/create_airflow_db.sh:/docker-entrypoint-initdb.d/00_create_airflow_db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-mobi}", "-d", "mobi_scanner"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@mobi.local \
          --password admin || true
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: mobi_scraper
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mobi_scanner
      POSTGRES_USER: ${POSTGRES_USER:-mobi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobi123}
      SCRAPER_MODE: ${SCRAPER_MODE:-demo}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mobi_streamlit
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mobi_scanner
      POSTGRES_USER: ${POSTGRES_USER:-mobi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobi123}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
  airflow_plugins:
